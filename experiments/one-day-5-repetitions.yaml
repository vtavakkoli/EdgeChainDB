name: EdgeChainDB one-day balanced screening campaign, five repetitions
repetitions: 5
design:
  type: balanced_screening
  configurations_per_repetition: 60
  seed: 20260721
  target_runtime_hours: 24
matrix:
  devices: [1, 5, 20, 50, 100]
  events: [10, 100, 1000, 10000]
  block_size: [1, 16, 64, 256, 1024]
  authority_thresholds:
    - {authorities: 1, threshold: 1}
    - {authorities: 3, threshold: 2}
    - {authorities: 4, threshold: 3}
    - {authorities: 7, threshold: 5}
  packet_loss_percent: [0, 1, 5, 10]
  outage_seconds: [5, 30, 300]
execution:
  image: edgechaindb:0.8.3
  packet_loss_mode: netem
  gateway_start_timeout_seconds: 120
  run_timeout_seconds: 3600
  reconnect_grace_seconds: 600
  cleanup_successful_runs: true
  retain_failed_containers: false
  collect_success_logs: false
  max_latency_samples_per_device: 10000
  worker_generation_batch: 1000
