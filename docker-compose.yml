name: edgechaindb

x-json-logging: &json-logging
  logging:
    driver: local
    options:
      max-size: "10m"
      max-file: "5"

x-device-common: &device-common
  image: edgechaindb:0.8.2
  build:
    context: .
    dockerfile: Dockerfile
  command: ["python", "-m", "edgechaindb.device_node", "--continuous"]
  restart: unless-stopped
  <<: *json-logging
  read_only: true
  tmpfs:
    - /tmp
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  mem_limit: 128m
  cpus: 0.25
  stop_grace_period: 10s
  depends_on:
    gateway:
      condition: service_healthy
  networks:
    - edgechain-net
  healthcheck:
    test: ["CMD", "python", "-c", "import json,pathlib; p=pathlib.Path('/data/state.json'); d=json.loads(p.read_text()) if p.exists() else {}; raise SystemExit(0 if int(d.get('sequence',0)) > 0 else 1)"]
    interval: 5s
    timeout: 3s
    retries: 24
    start_period: 10s
  environment: &device-environment
    GATEWAY_URL: http://gateway:8000
    DEVICE_STATE_DIR: /data
    DEVICE_EVENTS: "8"
    DEVICE_INTERVAL_MS: "1000"
    DEVICE_STARTUP_JITTER_MS: "1500"
    DEVICE_MAX_RETRIES: "40"
    DEVICE_REQUEST_TIMEOUT: "10"
    DEVICE_CONTINUOUS: "1"
    DEVICE_MAX_BUFFERED_EVENTS: "10000"
    EDGECHAIN_LOG_LEVEL: INFO

services:
  gateway:
    image: edgechaindb:0.8.2
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "edgechaindb.gateway_server", "--database", "/data/edgechain.db", "--node-key", "/data/gateway.key", "--node-id", "gateway-01", "--quorum", "1", "--batch-size", "25", "--host", "0.0.0.0", "--api-port", "8000", "--monitor-port", "3030"]
    user: "0:0"
    restart: unless-stopped
    <<: *json-logging
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    # The image initializes /data as UID 1000, while the gateway runs as root
    # so it can access the local Docker socket used by the development dashboard.
    # After dropping all capabilities, root cannot write to an existing UID-1000
    # named volume unless DAC_OVERRIDE is restored. Keep the capability narrowly
    # scoped to this local gateway service.
    cap_add:
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    ports:
      - "127.0.0.1:8000:8000"
      # A real second listener runs inside the gateway container.
      - "127.0.0.1:3030:3030"
    environment:
      EDGECHAIN_COMPOSE_PROJECT: "${COMPOSE_PROJECT_NAME:-edgechaindb}"
      EDGECHAIN_RESULT_DIR: /results
      EDGECHAIN_LOG_LEVEL: INFO
      EDGECHAIN_MONITOR_PORT: "3030"
    volumes:
      - gateway-data:/data
      - ./result:/results:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - edgechain-net
    healthcheck:
      test: ["CMD", "python", "-c", "import json,urllib.request; a=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3)); m=json.load(urllib.request.urlopen('http://127.0.0.1:3030/monitor/health',timeout=3)); h=urllib.request.urlopen('http://127.0.0.1:3030/',timeout=3).read(); raise SystemExit(0 if a.get('status')=='ok' and m.get('dashboard')=='ready' and b'EdgeChainDB Cluster Monitor' in h else 1)"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  device-01:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-01
    volumes:
      - device-01-data:/data

  device-02:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-02
    volumes:
      - device-02-data:/data

  device-03:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-03
    volumes:
      - device-03-data:/data

  device-04:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-04
    volumes:
      - device-04-data:/data

  device-05:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-05
    volumes:
      - device-05-data:/data

  device-06:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-06
    volumes:
