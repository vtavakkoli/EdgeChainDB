      DEVICE_ID: iot-device-20
    volumes:
      - device-20-data:/data

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["test"]
    user: "${EDGECHAIN_UID:-1000}:${EDGECHAIN_GID:-1000}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: ["edgechain-system-test", "--mode", "remote", "--base-url", "http://gateway:8000", "--expected-devices", "20", "--events-per-device", "8", "--result-dir", "/app/result", "--compose-file", "/app/docker-compose.yml"]
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./result:/app/result
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    networks:
      - edgechain-net

networks:
  edgechain-net:
    name: edgechain-iot-net
    driver: bridge
    internal: true

