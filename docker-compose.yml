name: edgechaindb-20-node-test

x-device-common: &device-common
  build:
    context: .
    dockerfile: Dockerfile
  command: ["edgechain-device"]
  restart: "no"
  read_only: true
  tmpfs:
    - /tmp
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  mem_limit: 128m
  cpus: 0.25
  depends_on:
    gateway:
      condition: service_healthy
  networks:
    - edgechain-net
  environment: &device-environment
    GATEWAY_URL: http://gateway:8000
    DEVICE_STATE_DIR: /data
    DEVICE_EVENTS: "8"
    DEVICE_INTERVAL_MS: "20"
    DEVICE_STARTUP_JITTER_MS: "1500"
    DEVICE_MAX_RETRIES: "40"
    DEVICE_REQUEST_TIMEOUT: "10"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["edgechain-api", "--database", "/data/edgechain.db", "--node-key", "/data/gateway.key", "--node-id", "gateway-01", "--quorum", "1", "--batch-size", "25", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    ports:
      - "8000:8000"
    volumes:
      - gateway-data:/data
    networks:
      - edgechain-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 3s

  device-01:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-01
    volumes:
      - device-01-data:/data

  device-02:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-02
    volumes:
      - device-02-data:/data

  device-03:
