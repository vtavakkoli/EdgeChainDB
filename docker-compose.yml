  device-18:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-18
    volumes:
      - device-18-data:/data

  device-19:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-19
    volumes:
      - device-19-data:/data

  device-20:
    <<: *device-common
    environment:
      <<: *device-environment
      DEVICE_ID: iot-device-20
    volumes:
      - device-20-data:/data

  run:
    image: edgechaindb:0.8.2
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "edgechaindb.cluster_runtime"]
    restart: unless-stopped
    <<: *json-logging
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      GATEWAY_URL: http://gateway:8000
      CLUSTER_STATUS_INTERVAL: "15"
      EDGECHAIN_LOG_LEVEL: INFO
    depends_on:
      gateway:
        condition: service_healthy
      device-01:
        condition: service_healthy
      device-02:
        condition: service_healthy
      device-03:
        condition: service_healthy
      device-04:
        condition: service_healthy
      device-05:
        condition: service_healthy
      device-06:
        condition: service_healthy
      device-07:
        condition: service_healthy
      device-08:
        condition: service_healthy
      device-09:
        condition: service_healthy
      device-10:
        condition: service_healthy
      device-11:
        condition: service_healthy
      device-12:
        condition: service_healthy
      device-13:
        condition: service_healthy
      device-14:
        condition: service_healthy
      device-15:
        condition: service_healthy
      device-16:
        condition: service_healthy
      device-17:
        condition: service_healthy
      device-18:
        condition: service_healthy
      device-19:
        condition: service_healthy
      device-20:
        condition: service_healthy
    networks:
      - edgechain-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://gateway:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  test:
    image: edgechaindb:0.8.2
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["test"]
    user: "0:0"
    command: ["python", "-m", "edgechaindb.benchmark", "--base-url", "http://gateway:8000", "--expected-devices", "20", "--events-per-device", "8", "--result-dir", "/app/result", "--compose-file", "/app/docker-compose.yml", "--project-root", "/app"]
    restart: "no"
    <<: *json-logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      EDGECHAIN_COMPOSE_PROJECT: "${COMPOSE_PROJECT_NAME:-edgechaindb}"
      EDGECHAIN_LOG_LEVEL: INFO
    depends_on:
      run:
        condition: service_healthy
    volumes:
      - ./result:/app/result
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - edgechain-net

  experiment: &experiment-service
    image: edgechaindb:0.8.2
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["experiment"]
    user: "0:0"
    command:
      - python
      - -m
      - edgechaindb.experiments.runner
      - --config
      - /app/experiments/full-matrix.yaml
      - --result-dir
      - /result/experiments
      - --resume
      - --rerun-failed
      - --report-every
      - "10"
    restart: "no"
    <<: *json-logging
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      EDGECHAIN_LOG_LEVEL: INFO
      EDGECHAIN_EXPERIMENT_CONFIG: /app/experiments/full-matrix.yaml
      EDGECHAIN_EXPERIMENT_RESULT_DIR: /result/experiments
    volumes:
      - ./result/experiments:/result/experiments
      - ./experiments:/app/experiments:ro
      - /var/run/docker.sock:/var/run/docker.sock

  # Backward-compatible alias for the common "experment" spelling.
  # A campaign lock prevents accidental concurrent execution with `experiment`.
  experment:
    <<: *experiment-service
    profiles: ["experment"]

networks:
  edgechain-net:
    name: edgechain-iot-net
    driver: bridge
    internal: true

